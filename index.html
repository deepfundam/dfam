<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Deep Fund AM</title>
<meta name="robots" content="noindex, nofollow">
<!-- https://github.com/jschneerson -->
<link rel="icon" href="/favicon.ico" sizes="48x48">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    min-height: 100dvh;
    background: #0a0a0a;
    color: #e8e8e8;
    font-family: 'Outfit', sans-serif;
    font-weight: 300;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  .scene {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: clamp(1rem, 4vmin, 2.5rem);
    min-height: 100vh;
    min-height: 100dvh;
    width: 100%;
  }

  @media (orientation: landscape) and (max-height: 500px) {
    .scene {
      flex-direction: row;
      gap: clamp(1.5rem, 4vw, 3rem);
      padding: 1rem 2rem;
    }
    .content { margin-top: 0; text-align: left; }
  }

  .logo-wrap {
    width: min(48vmin, 320px);
    aspect-ratio: 1;
    cursor: crosshair;
    position: relative;
    flex-shrink: 0;
  }
  .logo-wrap svg { width: 100%; height: 100%; display: block; }
  .logo-wrap canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }

  .content {
    text-align: center;
    margin-top: clamp(1.5rem, 4vmin, 2.5rem);
    opacity: 0;
    transform: translateY(12px);
    animation: fadeUp 1.2s ease 0.6s forwards;
    max-width: 520px;
    padding: 0 0.5rem;
  }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  h1 {
    font-weight: 600;
    font-size: clamp(1.2rem, 3.5vw, 2rem);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #ffffff;
    margin-bottom: clamp(0.8rem, 2vmin, 1.6rem);
  }

  .tagline {
    font-size: clamp(0.88rem, 2vw, 1.08rem);
    line-height: 1.75;
    color: #707070;
  }
  .tagline em {
    font-style: normal;
    color: #a8a8a8;
  }

  .contact {
    display: inline-block;
    margin-top: clamp(1.2rem, 3vmin, 2.4rem);
    color: #3a3a3a;
    text-decoration: none;
    font-size: clamp(0.72rem, 1.8vw, 0.82rem);
    letter-spacing: 0.06em;
    transition: color 0.4s;
  }
  .contact:hover, .contact:active { color: #ffffff; }
</style>
</head>
<body>

<div class="scene">
  <div class="logo-wrap" id="wrap">
    <svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
      <!-- https://github.com/jschneerson -->
      <rect width="500" height="500" fill="transparent"/>
      <g transform="translate(250,250)">
        <g id="l1"><rect id="r1" x="-145" y="-145" width="290" height="290" rx="4" fill="none" stroke="#2a2a2a" stroke-width="0.5"/></g>
        <g id="l2"><rect id="r2" x="-85" y="-85" width="170" height="170" rx="4" fill="none" stroke="#555" stroke-width="0.5"/></g>
        <g id="l3"><rect id="r3" x="-30" y="-30" width="60" height="60" rx="2" fill="#e8e8e8"/></g>
      </g>
    </svg>
    <canvas id="fx"></canvas>
  </div>

  <div class="content">
    <h1>Deep Fund AM</h1>
    <p class="tagline"><em>Invests long in breakthrough technologies,</em> backed by short-term core market operations.</p>
    <a class="contact" href="mailto:info&#64;deepfundam.com">info&#64;deepfundam.com</a>
  </div>
</div>

<script>
/* https://github.com/jschneerson */
(function(){
  var wrap=document.getElementById('wrap');
  var canvas=document.getElementById('fx');
  var ctx=canvas.getContext('2d');
  var dpr=window.devicePixelRatio||1;

  function resize(){
    var r=wrap.getBoundingClientRect();
    canvas.width=r.width*dpr;
    canvas.height=r.height*dpr;
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  resize();
  window.addEventListener('resize',resize);
  window.addEventListener('orientationchange',function(){setTimeout(resize,200);});

  var layers=[
    {el:document.getElementById('l1'),rect:document.getElementById('r1'),factor:70,half:145,baseStroke:'#2a2a2a',baseSW:0.5,flashColors:['#00f0ff','#b400ff','#ff003c']},
    {el:document.getElementById('l2'),rect:document.getElementById('r2'),factor:20,half:85,baseStroke:'#555',baseSW:0.5,flashColors:['#00ff6a','#fff200','#00f0ff']},
    {el:document.getElementById('l3'),rect:document.getElementById('r3'),factor:2,half:30,baseStroke:null,baseSW:0,flashColors:[]}
  ];

  var rawMx=0,rawMy=0,mx=0,my=0,hovering=false,energy=0;
  var particles=[],arcs=[];
  var flashTimers=[0,0],flashOn=[false,false];
  var coreBrightness=0;
  var coreBase={r:232,g:232,b:232};
  var coreTint={r:232,g:232,b:232};

  function randFrom(a){return a[Math.floor(Math.random()*a.length)];}
  function hexRgb(h){return{r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)};}
  function lerp(a,b,t){return a+(b-a)*t;}
  function wrapSize(){return wrap.getBoundingClientRect().width;}

  function edgePoint(li,sc){
    var l=layers[li],s=l.half*sc;
    var ws=wrapSize(),cx=ws/2,cy=ws/2;
    var ox=mx*l.factor*sc,oy=my*l.factor*sc;
    var side=Math.floor(Math.random()*4),t=Math.random();
    if(side===0)return{x:cx-s+t*2*s+ox,y:cy-s+oy};
    if(side===1)return{x:cx+s+ox,y:cy-s+t*2*s+oy};
    if(side===2)return{x:cx-s+t*2*s+ox,y:cy+s+oy};
    return{x:cx-s+ox,y:cy-s+t*2*s+oy};
  }

  function coreCenter(sc){
    var ws=wrapSize();
    return{x:ws/2+mx*layers[2].factor*sc,y:ws/2+my*layers[2].factor*sc};
  }

  var pTypes=['swift','swift','swift','drift','drift','heavy'];

  function spawnParticle(fromLi,toLi,type,sc){
    var origin=edgePoint(fromLi,sc);
    var target;
    if(type==='converge'){var c=coreCenter(sc);target={x:c.x+(Math.random()-0.5)*14,y:c.y+(Math.random()-0.5)*14};}
    else{target=edgePoint(toLi,sc);}
    var dist=Math.sqrt(Math.pow(target.x-origin.x,2)+Math.pow(target.y-origin.y,2));
    var pType=randFrom(pTypes);
    var speed,w,curve;
    if(pType==='swift'){speed=55+Math.random()*30;w=0.3+Math.random()*0.4;curve=40;}
    else if(pType==='drift'){speed=22+Math.random()*18;w=0.6+Math.random()*0.6;curve=90;}
    else{speed=15+Math.random()*12;w=1.2+Math.random()*1;curve=60;}
    var duration=Math.max(dist/speed,0.6);
    var color=randFrom(layers[fromLi].flashColors);
    particles.push({x:origin.x,y:origin.y,startX:origin.x,startY:origin.y,targetX:target.x,targetY:target.y,progress:0,duration:duration,color:color,w:w,prevX:origin.x,prevY:origin.y,type:type,pType:pType,cpX:(origin.x+target.x)/2+(Math.random()-0.5)*curve,cpY:(origin.y+target.y)/2+(Math.random()-0.5)*curve});
  }

  function spawnArc(fromLi,toLi,sc){
    var p1=edgePoint(fromLi,sc),p2=edgePoint(toLi,sc);
    var color=randFrom(layers[fromLi].flashColors);
    var segs=[{x:p1.x,y:p1.y}];
    var n=5+Math.floor(Math.random()*4);
    for(var i=1;i<n;i++){var t=i/n;segs.push({x:p1.x+(p2.x-p1.x)*t+(Math.random()-0.5)*22,y:p1.y+(p2.y-p1.y)*t+(Math.random()-0.5)*22});}
    segs.push({x:p2.x,y:p2.y});
    arcs.push({segs:segs,color:color,life:0.12+Math.random()*0.18,maxLife:0.12+Math.random()*0.18,w:0.3+Math.random()*1});
  }

  function easeInOutCubic(t){return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;}
  function bezier(t,p0,p1,p2){var mt=1-t;return mt*mt*p0+2*mt*t*p1+t*t*p2;}

  function animate(){
    var ws=wrapSize();
    ctx.clearRect(0,0,ws,ws);
    var sc=ws/500;

    var smoothing=hovering?0.12:0.04;
    if(!hovering){rawMx*=0.97;rawMy*=0.97;}
    mx=lerp(mx,rawMx,smoothing);
    my=lerp(my,rawMy,smoothing);
    layers.forEach(function(l){l.el.setAttribute('transform','translate('+mx*l.factor+','+my*l.factor+')');});

    if(hovering){energy=Math.min(energy+0.02,1);}
    else{energy*=0.992;}
    var isActive=energy>0.02;

    flashTimers[0]-=0.016;
    if(flashTimers[0]<=0&&isActive&&Math.random()<0.06*energy){
      layers[0].rect.setAttribute('stroke',randFrom(layers[0].flashColors));
      layers[0].rect.setAttribute('stroke-width','1.5');
      flashTimers[0]=0.05+Math.random()*0.15;flashOn[0]=true;
      var n=3+Math.floor(Math.random()*4);
      for(var k=0;k<n;k++){if(Math.random()<0.3)spawnParticle(0,2,'converge',sc);else spawnParticle(0,1,'circulate',sc);}
      if(Math.random()<0.5)spawnArc(0,1,sc);
    }
    if(flashTimers[0]<=0&&flashOn[0]){layers[0].rect.setAttribute('stroke',layers[0].baseStroke);layers[0].rect.setAttribute('stroke-width','0.5');flashOn[0]=false;}

    flashTimers[1]-=0.016;
    if(flashTimers[1]<=0&&isActive&&Math.random()<0.04*energy){
      layers[1].rect.setAttribute('stroke',randFrom(layers[1].flashColors));
      layers[1].rect.setAttribute('stroke-width','1');
      flashTimers[1]=0.04+Math.random()*0.12;flashOn[1]=true;
      var n=2+Math.floor(Math.random()*3);
      for(var k=0;k<n;k++)spawnParticle(1,2,'converge',sc);
    }
    if(flashTimers[1]<=0&&flashOn[1]){layers[1].rect.setAttribute('stroke',layers[1].baseStroke);layers[1].rect.setAttribute('stroke-width','0.5');flashOn[1]=false;}

    if(isActive){
      if(Math.random()<0.025*energy)spawnArc(0,1,sc);
      if(Math.random()<0.015*energy)spawnArc(1,0,sc);
      if(Math.random()<0.05*energy)spawnParticle(0,1,'circulate',sc);
      if(Math.random()<0.04*energy)spawnParticle(1,2,'converge',sc);
      if(Math.random()<0.02*energy)spawnParticle(0,2,'converge',sc);
    }

    for(var i=arcs.length-1;i>=0;i--){
      var a=arcs[i];a.life-=0.016;
      if(a.life<=0){arcs.splice(i,1);continue;}
      var alpha=(a.life/a.maxLife)*0.45;
      ctx.beginPath();ctx.moveTo(a.segs[0].x,a.segs[0].y);
      for(var j=1;j<a.segs.length;j++)ctx.lineTo(a.segs[j].x,a.segs[j].y);
      ctx.strokeStyle=a.color;ctx.globalAlpha=alpha;ctx.lineWidth=a.w*(a.life/a.maxLife);ctx.lineCap='round';ctx.stroke();ctx.globalAlpha=1;
    }

    var arrivals=0,lastColor=null;
    for(var i=particles.length-1;i>=0;i--){
      var p=particles[i];p.prevX=p.x;p.prevY=p.y;p.progress+=0.016/p.duration;
      if(p.progress>=1){if(p.type==='converge'){arrivals++;lastColor=p.color;}particles.splice(i,1);continue;}
      var ease=easeInOutCubic(p.progress);
      var jitter=(1-ease)*(p.pType==='heavy'?0.5:p.pType==='drift'?1.8:0.8);
      p.x=bezier(ease,p.startX,p.cpX,p.targetX)+(Math.random()-0.5)*jitter;
      p.y=bezier(ease,p.startY,p.cpY,p.targetY)+(Math.random()-0.5)*jitter;
      var alpha;
      if(p.progress<0.06)alpha=p.progress/0.06*0.3;
      else if(p.type==='converge')alpha=0.2+0.7*ease;
      else alpha=0.2+0.4*Math.sin(p.progress*Math.PI);
      var tailMul=p.pType==='swift'?1.5:p.pType==='drift'?1:0.5;
      ctx.beginPath();ctx.moveTo(lerp(p.prevX,p.x,1-tailMul*0.5),lerp(p.prevY,p.y,1-tailMul*0.5));ctx.lineTo(p.x,p.y);
      ctx.strokeStyle=p.color;ctx.globalAlpha=alpha;ctx.lineWidth=p.w*(0.5+ease*0.8);ctx.lineCap='round';ctx.stroke();
      var dotR=p.pType==='heavy'?p.w*1.2:p.pType==='drift'?p.w*0.6:p.w*0.35;
      ctx.beginPath();ctx.arc(p.x,p.y,dotR,0,Math.PI*2);ctx.fillStyle=p.color;ctx.globalAlpha=alpha*(p.pType==='heavy'?0.8:0.5);ctx.fill();ctx.globalAlpha=1;
    }

    if(lastColor)coreTint=hexRgb(lastColor);
    coreBrightness+=arrivals*0.2;coreBrightness*=0.91;
    var cb=Math.min(coreBrightness,0.85);
    var fr=Math.round(lerp(coreBase.r,coreTint.r,cb));
    var fg=Math.round(lerp(coreBase.g,coreTint.g,cb));
    var fb=Math.round(lerp(coreBase.b,coreTint.b,cb));
    layers[2].rect.setAttribute('fill','rgb('+fr+','+fg+','+fb+')');

    requestAnimationFrame(animate);
  }
  animate();

  function onMove(px,py){
    var r=wrap.getBoundingClientRect();
    rawMx=(px-r.left)/r.width-0.5;
    rawMy=(py-r.top)/r.height-0.5;
    hovering=true;
  }
  function onEnd(){hovering=false;}

  wrap.addEventListener('mousemove',function(e){onMove(e.clientX,e.clientY);});
  wrap.addEventListener('mouseleave',onEnd);
  wrap.addEventListener('touchmove',function(e){e.preventDefault();onMove(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
  wrap.addEventListener('touchend',onEnd);
})();
</script>

</body>
</html>
